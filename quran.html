<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/quran.css"></style>
        <title>Yasir Al Amriki - Qur'an</title>
        <link rel="icon" type="image/png" href="assets/favicon-48x48.png" sizes="48x48" />
        <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
        <link rel="shortcut icon" href="assets/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="YasirAlAmriki" />
        <link rel="manifest" href="assets/site.webmanifest" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div>
            <h2>Input</h2>
            <div>
                <input placeholder="Surah #" id="surahinput" type="number">
                <input placeholder="Ayah #" id="ayahinput" type="number">
                <button id="getayahbutton">Get Ayah</button>
            </div>
        </div>
        <div>
            <h2>Output</h2>
            <div id="outputcard">
                <h3>Surah #: Ayah #</h3>
                <h4 id="arabictext">Arabic</h4>
                <p id="englishtext">English</p>
            </div>
            <script src="js/quran.js"></script>
        </div>
    </body>
</html>
